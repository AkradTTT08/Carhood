services:
  mongodb:
    image: mongo:latest
    container_name: kahoot_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kahoot_clone

  backend:
    build: ./backend
    container_name: kahoot_backend
    ports:
      - "8081:8081"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: kahoot_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
